openapi: 3.0.3
info:
  title: TraceChain API
  version: 1.0.0
  description: |
    Off-chain API for the TraceChain pharmaceutical hybrid DApp. The API manages
    wallet-signature authentication, organization profiles, batch metadata,
    telemetry ingestion, document uploads, and blockchain event indexing.
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service health payload
  /api/auth/nonce:
    post:
      summary: Request a wallet-signature nonce
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                walletAddress:
                  type: string
      responses:
        '200':
          description: Nonce and signable message
  /api/auth/verify:
    post:
      summary: Verify wallet signature and issue JWT
      responses:
        '200':
          description: Auth token and organization context
  /api/organizations/me:
    get:
      summary: Get the authenticated organization profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Organization profile
    put:
      summary: Create or update the authenticated organization profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated profile
  /api/organizations:
    get:
      summary: List registered organizations
      responses:
        '200':
          description: Participant list
  /api/batches:
    get:
      summary: List batches with status and search filters
      responses:
        '200':
          description: Batch summaries
  /api/batches/draft:
    post:
      summary: Create an off-chain batch draft and return deterministic hashes for on-chain registration
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Draft created
  /api/batches/{id}/link-onchain:
    post:
      summary: Attach an on-chain batch ID and registration transaction hash to a draft
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Linked batch
  /api/batches/{identifier}:
    get:
      summary: Fetch a batch detail view by DB id, batch code, or on-chain batch ID
      parameters:
        - in: path
          name: identifier
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Batch detail
  /api/batches/{identifier}/timeline:
    get:
      summary: Return the combined audit, telemetry, and transfer timeline for a batch
      responses:
        '200':
          description: Timeline entries
  /api/batches/{id}/transfers:
    post:
      summary: Log an off-chain transfer record after submitting the on-chain transaction
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Transfer logged
  /api/documents:
    post:
      summary: Upload a supporting document to IPFS via the backend
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Uploaded document metadata
  /api/telemetry:
    post:
      summary: Record a telemetry checkpoint or anomaly reading for a batch
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Telemetry reading created
  /api/stats/overview:
    get:
      summary: Dashboard aggregate metrics
      responses:
        '200':
          description: Overview metrics
  /api/chain/status:
    get:
      summary: Get chain projection status and last processed block
      responses:
        '200':
          description: Chain sync status
  /api/chain/sync:
    post:
      summary: Force a chain projection sync
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sync completed
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
